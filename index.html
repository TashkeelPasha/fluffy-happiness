<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Aamir Ahsan Khan — Philanthropist · Non-Executive Director · Sustainability Consultant</title>
    <meta
      name="description"
      content="Strategist working on energy reform, anti-corruption, and a debt-free, sustainable Pakistan. Board advisor at the Global Chamber. London-based."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Aamir Ahsan Khan — Philanthropist & Non-Executive Director" />
    <meta
      property="og:description"
      content="Strategist working on energy reform, anti-corruption, and a debt-free, sustainable Pakistan."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD: Person -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Aamir Ahsan Khan",
        "jobTitle": "Philanthropist · Non-Executive Director · Sustainability Consultant",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "London",
          "addressCountry": "United Kingdom"
        },
        "worksFor": [
          { "@type": "Organization", "name": "Indus Venture" },
          { "@type": "Organization", "name": "The Global Chamber" }
        ],
        "alumniOf": [
          { "@type": "EducationalOrganization", "name": "Postgraduate Institute of Management (PIM)" },
          { "@type": "EducationalOrganization", "name": "South Shields Marine School" }
        ],
        "award": "Ambassador for Fight Against Corruption — International Human Rights Commission, 2011"
      }
    </script>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader" aria-hidden="true">
      <div class="preloader__inner">
        <span class="preloader__label mono">Loading</span>
        <span class="preloader__counter serif-italic">0</span>
      </div>
      <div class="preloader__veil"></div>
    </div>

    <!-- Nav mounts here -->
    <header id="nav" class="nav" role="banner"></header>

    <main id="main">
      <section id="hero" class="section section--hero" aria-labelledby="hero-name"></section>
      <section id="manifesto" class="section section--manifesto section--dark" aria-labelledby="manifesto-title"></section>
      <section id="pillars" class="section section--pillars" aria-labelledby="pillars-title"></section>
      <section id="recognition" class="section section--recognition" aria-labelledby="recognition-title"></section>
      <section id="expertise" class="section section--expertise section--dark" aria-labelledby="expertise-title"></section>
      <section id="experience" class="section section--experience" aria-labelledby="experience-title"></section>
      <section id="voice" class="section section--voice" aria-labelledby="voice-title"></section>
      <section id="services" class="section section--services section--dark" aria-labelledby="services-title"></section>
      <section id="education" class="section section--education section--tight" aria-labelledby="education-title"></section>
      <section id="contact" class="section section--contact" aria-labelledby="contact-title"></section>
    </main>

    <footer id="footer" class="footer" role="contentinfo"></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
